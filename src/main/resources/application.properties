spring.application.name=MyTourApi

# Server Port
server.port=${PORT:8080}

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mytourdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
# Let Spring Boot automatically detect the driver based on the URL
# spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns schema creation and evolution. Hibernate validates the schema against the JPA mappings.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Add this to help Hibernate auto-detect dialect locally/on Render if detection fails early
spring.jpa.database=postgresql

# CORS Configuration for standard MVC
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# JWT Authentication
security.jwt.secret=${JWT_SECRET:dev-only-change-me-at-least-32-characters}
security.jwt.issuer=${JWT_ISSUER:mytour-api}
security.jwt.expiration=${JWT_EXPIRATION:12h}

# OpenRouteService Directions API
clients.openrouteservice.enabled=${ORS_ENABLED:true}
clients.openrouteservice.base-url=${ORS_BASE_URL:https://api.openrouteservice.org}
clients.openrouteservice.api-key=${ORS_API_KEY:}
clients.openrouteservice.connect-timeout=${ORS_CONNECT_TIMEOUT:3s}
clients.openrouteservice.read-timeout=${ORS_READ_TIMEOUT:10s}
clients.openrouteservice.bike-profile=${ORS_BIKE_PROFILE:cycling-regular}
clients.openrouteservice.hike-profile=${ORS_HIKE_PROFILE:foot-hiking}
clients.openrouteservice.running-profile=${ORS_RUNNING_PROFILE:foot-walking}
clients.openrouteservice.vacation-profile=${ORS_VACATION_PROFILE:driving-car}
clients.openrouteservice.geocode-boundary-country=${ORS_GEOCODE_BOUNDARY_COUNTRY:AT}

# Open-Meteo Weather API
clients.openmeteo.enabled=${OPEN_METEO_ENABLED:true}
clients.openmeteo.archive-base-url=${OPEN_METEO_ARCHIVE_BASE_URL:https://archive-api.open-meteo.com}
clients.openmeteo.forecast-base-url=${OPEN_METEO_FORECAST_BASE_URL:https://api.open-meteo.com}
clients.openmeteo.connect-timeout=${OPEN_METEO_CONNECT_TIMEOUT:3s}
clients.openmeteo.read-timeout=${OPEN_METEO_READ_TIMEOUT:10s}
clients.openmeteo.forecast-past-days=${OPEN_METEO_FORECAST_PAST_DAYS:92}
clients.openmeteo.forecast-days=${OPEN_METEO_FORECAST_DAYS:16}

# Filesystem cover-image storage. PostgreSQL stores only the metadata/path reference.
storage.images.base-directory=${IMAGE_STORAGE_BASE_DIRECTORY:${java.io.tmpdir}/mytour-cover-images}
storage.images.max-size-bytes=${IMAGE_MAX_SIZE_BYTES:5242880}
storage.images.allowed-content-types=${IMAGE_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}

# Actuator Endpoints Exposure
management.endpoints.web.exposure.include=health,info

# Explicit Actuator CORS Configuration
management.endpoints.web.cors.allowed-origins=${cors.allowed-origins}
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
management.endpoints.web.cors.allowed-headers=*
