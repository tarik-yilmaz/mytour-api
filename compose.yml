services:
  db:
    image: postgres:17-alpine
    container_name: mytour-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mytour-api-app
    ports:
      - "${APP_PORT}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-me-at-least-32-characters}
      - JWT_ISSUER=${JWT_ISSUER:-mytour-api}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-12h}
      - ORS_ENABLED=${ORS_ENABLED:-true}
      - ORS_BASE_URL=${ORS_BASE_URL:-https://api.openrouteservice.org}
      - ORS_API_KEY=${ORS_API_KEY}
      - ORS_CONNECT_TIMEOUT=${ORS_CONNECT_TIMEOUT:-3s}
      - ORS_READ_TIMEOUT=${ORS_READ_TIMEOUT:-10s}
      - ORS_BIKE_PROFILE=${ORS_BIKE_PROFILE:-cycling-regular}
      - ORS_HIKE_PROFILE=${ORS_HIKE_PROFILE:-foot-hiking}
      - ORS_RUNNING_PROFILE=${ORS_RUNNING_PROFILE:-foot-walking}
      - ORS_VACATION_PROFILE=${ORS_VACATION_PROFILE:-driving-car}
      - ORS_GEOCODE_BOUNDARY_COUNTRY=${ORS_GEOCODE_BOUNDARY_COUNTRY:-AT}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ../mytour-ui
    container_name: mytour-ui-app
    ports:
      - "${UI_PORT:-4200}:4200"
    environment:
      - API_URL=http://localhost:${APP_PORT:-8080}
    depends_on:
      app:
        condition: service_healthy
